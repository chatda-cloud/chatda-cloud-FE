name: Build & Distribute APK

# main 브랜치에 push하면 자동 실행 + 수동 실행 가능
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Actions 탭에서 수동으로도 실행 가능

jobs:
  build-apk:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💙 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true  # 분석 실패해도 빌드는 계속 진행

      - name: 🏗️ Build Debug APK
        run: flutter build apk --debug --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} --dart-define=LAMBDA_BASE_URL=${{ secrets.LAMBDA_BASE_URL }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatda-cloud-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30  # 30일간 다운로드 가능
